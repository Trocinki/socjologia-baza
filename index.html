<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socjologia — Baza Pytań</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ====== SYSTEM NAGRODY: zmienne sterowane przez JS (bloom) ====== */
:root{
  --bloom: 0;                 /* 0..1 — poziom rozkwitu */
  --bg-h: 222; --bg-s: 14%; --bg-l: 7%;
  --surface-h: 224; --surface-s: 16%; --surface-l: 11%;
  --accent-h: 205; --accent-s: 22%; --accent-l: 52%;
  --accent2-h: 250;
  --aurora: 0;                /* siła tła-aurory */
  --glow: 0px;                /* poświata aktywnych elementów */
  --ink: #e9edf5;
  --ink-soft: #9aa6bd;
  --line: hsl(var(--surface-h) 18% 22%);
  --accent: hsl(var(--accent-h) var(--accent-s) var(--accent-l));
  --accent2: hsl(var(--accent2-h) calc(var(--accent-s) + 8%) calc(var(--accent-l) + 6%));
  --ok: #38b27a; --ok-bg: hsl(155 38% 16%); --ok-bd: hsl(155 36% 30%);
  --no: #e06a78; --no-bg: hsl(350 40% 17%); --no-bd: hsl(350 44% 34%);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Hanken Grotesk",sans-serif;
  color:var(--ink);
  background:hsl(var(--bg-h) var(--bg-s) var(--bg-l));
  min-height:100vh;
  line-height:1.55;
  transition:background .9s ease;
  position:relative;
  overflow-x:hidden;
}
/* Aurora tła — rośnie wraz z serią poprawnych odpowiedzi */
body::before{
  content:"";position:fixed;inset:-20% -10% -10% -10%;z-index:-2;pointer-events:none;
  background:
    radial-gradient(40% 50% at 18% 22%, hsl(var(--accent-h) 80% 55% / .55), transparent 70%),
    radial-gradient(45% 55% at 82% 18%, hsl(var(--accent2-h) 82% 58% / .5), transparent 72%),
    radial-gradient(55% 60% at 50% 92%, hsl(calc(var(--accent-h) + 40) 78% 52% / .45), transparent 75%);
  opacity:var(--aurora);
  filter:blur(20px) saturate(1.1);
  transition:opacity 1.2s ease, background 1.2s ease;
}
body::after{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(60% 50% at 50% 0%, transparent, hsl(var(--bg-h) var(--bg-s) calc(var(--bg-l) - 3%)) 90%);
  transition:background .9s ease;
}

.wrap{max-width:760px;margin:0 auto;padding:28px 20px 60px}

/* ====== Nagłówek / pasek stanu ====== */
header.top{
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  margin-bottom:18px;flex-wrap:wrap;
}
.brand{font-family:"Fraunces",serif;font-weight:600;font-size:1.55rem;letter-spacing:-.01em}
.brand em{font-style:italic;color:var(--accent);transition:color .9s ease}

#dashboard{
  display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;
  margin-bottom:16px;
}
.stat{
  background:hsl(var(--surface-h) var(--surface-s) var(--surface-l) / .8);
  border:1px solid var(--line);
  border-radius:14px;padding:10px 16px;flex:1;min-width:96px;
  backdrop-filter:blur(6px);
  transition:border-color .9s ease,background .9s ease;
}
.stat .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft)}
.stat .val{font-family:"Fraunces",serif;font-size:1.5rem;font-weight:600;line-height:1.1}
.stat .val small{font-size:.8rem;color:var(--ink-soft);font-family:"Hanken Grotesk"}
#streak-stat .val{color:var(--accent);transition:color .9s ease}

/* ====== Pasek narzędzi ====== */
.toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.switch{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none;font-size:.92rem;color:var(--ink-soft)}
.switch input{display:none}
.track{
  width:42px;height:24px;border-radius:999px;background:hsl(var(--surface-h) 16% 22%);
  position:relative;transition:background .25s ease;flex:none;border:1px solid var(--line);
}
.track::after{
  content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
  background:var(--ink-soft);transition:transform .25s ease,background .25s ease;
}
.switch input:checked + .track{background:hsl(var(--accent-h) 60% 40%);border-color:transparent}
.switch input:checked + .track::after{transform:translateX(18px);background:#fff}
.switch.on .label-txt{color:var(--ink)}

.btn-reset{
  margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--ink-soft);
  padding:8px 14px;border-radius:10px;cursor:pointer;font-size:.85rem;font-family:inherit;
  transition:.2s;
}
.btn-reset:hover{border-color:var(--no-bd);color:var(--no)}

/* ====== Pasek postępu ====== */
#progress{height:5px;border-radius:999px;background:hsl(var(--surface-h) 16% 18%);overflow:hidden;margin-bottom:22px}
#progress > div{height:100%;width:0;border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease,background .9s ease}

/* ====== Karta pytania ====== */
.card{
  background:hsl(var(--surface-h) var(--surface-s) var(--surface-l) / .82);
  border:1px solid var(--line);
  border-radius:22px;padding:30px 28px;
  backdrop-filter:blur(10px);
  box-shadow:0 24px 60px -30px hsl(var(--bg-h) 40% 2% / .9),
             0 0 var(--glow) hsl(var(--accent-h) 80% 55% / .35);
  transition:border-color .9s ease,box-shadow .9s ease,background .9s ease;
  animation:rise .5s cubic-bezier(.2,.7,.2,1);
}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

#retry-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:hsl(28 60% 16%);color:#f0b46a;border:1px solid hsl(28 50% 32%);
  padding:5px 12px;border-radius:999px;font-size:.75rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;
}
#qnum{font-size:.78rem;color:var(--ink-soft);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
#question{font-family:"Fraunces",serif;font-size:1.42rem;font-weight:500;line-height:1.35;margin:0 0 22px}

/* Opcje */
.option{
  display:flex;gap:14px;align-items:flex-start;
  padding:14px 16px;margin:10px 0;border-radius:14px;
  border:1px solid var(--line);background:hsl(var(--surface-h) 16% 14%);
  cursor:pointer;transition:.18s ease;font-size:1rem;
}
.option:hover{background:hsl(var(--surface-h) 16% 18%);border-color:hsl(var(--accent-h) 30% 38%);transform:translateX(2px)}
.option .key{
  flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
  background:hsl(var(--surface-h) 16% 20%);font-weight:700;font-size:.82rem;color:var(--ink-soft);
  transition:.18s;
}
.option:hover .key{background:hsl(var(--accent-h) 40% 30%);color:#fff}
.option.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:#d6f5e6;pointer-events:none}
.option.correct .key{background:var(--ok);color:#04130c}
.option.wrong{background:var(--no-bg);border-color:var(--no-bd);color:#ffd7dc;pointer-events:none}
.option.wrong .key{background:var(--no);color:#1a0508}
.option.disabled{pointer-events:none;opacity:.55}

/* Pytania sekwencyjne */
.seq{display:flex;align-items:center;gap:12px;padding:10px 14px;margin:9px 0;border-radius:14px;
  background:hsl(var(--surface-h) 16% 14%);border:1px solid var(--line);transition:.25s}
.seq .ctrl{display:flex;flex-direction:column;gap:4px}
.seq .ctrl button{width:30px;height:24px;border:none;border-radius:7px;cursor:pointer;
  background:hsl(var(--surface-h) 16% 22%);color:var(--ink);font-size:.8rem;transition:.15s}
.seq .ctrl button:hover:not(:disabled){background:var(--accent)}
.seq .ctrl button:disabled{opacity:.25;cursor:not-allowed}
.seq .txt{flex:1}
.seq.ok-seq{background:var(--ok-bg);border-color:var(--ok-bd);color:#d6f5e6}
.seq.no-seq{background:var(--no-bg);border-color:var(--no-bd);color:#ffd7dc}

.feedback{margin-top:16px;padding:14px 16px;border-radius:14px;font-weight:600}
.feedback.ok{background:var(--ok-bg);border:1px solid var(--ok-bd);color:#d6f5e6}
.feedback.no{background:var(--no-bg);border:1px solid var(--no-bd);color:#ffd7dc}

button.primary{
  margin-top:22px;width:100%;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;
  padding:15px;font-size:1rem;font-weight:700;font-family:inherit;letter-spacing:.01em;
  transition:filter .2s,background .9s ease;
}
button.primary:hover{filter:brightness(1.12)}
.kbd{background:hsl(0 0% 100% / .18);border-radius:6px;padding:1px 7px;font-size:.8em;font-family:monospace}

.hints{text-align:center;color:var(--ink-soft);font-size:.8rem;margin-top:18px;
  border-top:1px solid var(--line);padding-top:14px}
.hints .kbd{background:hsl(var(--surface-h) 16% 20%)}

.hidden{display:none !important}

/* Podsumowanie */
#summary h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.8rem;margin:0 0 6px}
.score-big{font-family:"Fraunces",serif;font-size:3.2rem;font-weight:600;line-height:1;
  background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.err{background:hsl(var(--surface-h) 16% 14%);border-left:3px solid var(--no);
  padding:14px 16px;border-radius:10px;margin:12px 0}
.err .q{font-weight:600;margin-bottom:8px}
.err .a{color:#d6f5e6;background:var(--ok-bg);border:1px solid var(--ok-bd);padding:9px 12px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">Socjologia <em>— baza pytań</em></div>
  </header>

  <div id="dashboard">
    <div class="stat"><div class="label">Pytanie</div><div class="val"><span id="cur">1</span><small> / <span id="tot">0</span></small></div></div>
    <div class="stat"><div class="label">Wynik</div><div class="val" id="score">0</div></div>
    <div class="stat" id="streak-stat"><div class="label">Seria</div><div class="val" id="streak">0</div></div>
  </div>

  <div class="toolbar">
    <label class="switch" id="shuffle-switch">
      <input type="checkbox" id="shuffle-toggle">
      <span class="track"></span>
      <span class="label-txt">Tasowanie pytań i odpowiedzi</span>
    </label>
    <button class="btn-reset" onclick="resetSession()">Reset sesji</button>
  </div>

  <div id="progress"><div></div></div>

  <div class="card" id="quiz">
    <div id="retry-badge" class="hidden">⟳ Powtórka — wcześniej błędna</div>
    <div id="qnum">Pytanie 1</div>
    <h2 id="question" style="font-family:'Fraunces',serif;font-weight:500;font-size:1.42rem;line-height:1.35;margin:0 0 22px">Ładowanie…</h2>
    <div id="options"></div>
    <button id="next" class="primary hidden">Następne pytanie <span class="kbd">Enter</span></button>
    <div class="hints">Klawisze: wybór <span class="kbd">A</span>–<span class="kbd">E</span> · zatwierdź / dalej <span class="kbd">Enter</span></div>
  </div>

  <div class="card hidden" id="summary">
    <h2>Podsumowanie</h2>
    <p style="color:var(--ink-soft);margin-top:0">Wynik końcowy</p>
    <div class="score-big"><span id="fscore">0</span> / <span id="ftot">0</span></div>
    <p style="font-size:1.1rem;margin-top:8px"><span id="fpct">0</span>% poprawnych odpowiedzi</p>
    <div id="errs" class="hidden">
      <h3 style="color:var(--no);border-bottom:1px solid var(--line);padding-bottom:8px;margin-top:28px">Pytania, które sprawiły trudność</h3>
      <div id="errlist"></div>
    </div>
    <button class="primary" onclick="restart()">Rozwiąż test ponownie</button>
  </div>

</div>

<script>
/* ============================================================
   DANE: pytania + klucz (klucz POPRAWIONY: 37→e, 42→d, 47→c, 56→e)
   ============================================================ */
const questionsText = `
(1) Charyzma to:
a) odmiana przesądów etnicznych
b) forma religii
c) forma legitymizacji władzy
d) konflikt ról
e) tyle co dyskryminacja
(2) Antysemityzm to:
a) przesąd rasowy
b) stereotyp
c) dyskryminacja mniejszości
d) przejaw nietolerancji
e) wszystko to razem
(3) Rozwój społeczny cechuje się wszystkimi poniższymi cechami prócz jednej. Której?
a) jest to proces endogenny
b) jest reakcją na zmiany w środowisku
c) posiada wyraźny kierunek
d) można go porównać ze wzrostem organizmu
e) prowadzi do podnoszenia wartości zmiennej, której dotyczy
(4) Górnicy to:
a) klasa społeczna
b) warstwa społeczna
c) grupa społeczna
d) kategoria zawodowa
e) zbiorowość lokalna
(5) Stereotyp to:
a) pewien stan umysłu
b) rodzaj działania
c) uproszczony i jednostronny obraz rzeczywistości
d) określona postawa
e) typ idealny
(6) Zjawisko tzw. „kręgu Kula" (wymiany darów w społecznościach wyspiarskich Polinezji) opisał:
a) A. R. Radcliffe-Brown
b) R. Firth
c) C. Cooley
d) E. Goffman
e) B. Malinowski
(7) Ewolucja społeczna w ujęciu Spencera to analogia do ewolucji gatunków opisanej przez Darwina.
a) prawda
b) fałsz
(8) Stosunek społeczny „lekarz-pacjent" ma wszystkie poniższe właściwości prócz jednej:
a) jest nieegalitarny
b) jest wyspecjalizowany
c) jest pierwotny
d) jest instrumentalny
e) jest wzajemny
(9) O tzw. „przesocjalizowanej koncepcji człowieka" pisał:
a) Cooley
b) Znaniecki
c) Wrong
d) White
e) Merton
(10) „Efekt Mateusza" (w nawiązaniu do Ewangelii) opisuje:
a) proces sekularyzacji
b) nawrócenie mniejszości etnicznych
c) pojawienie się herezji
d) kumulację przewag i przywilejów społecznych
e) rozpowszechnianie się dogmatyzmu i nietolerancji
(11) Poniższe czynniki (z wyjątkiem jednego) odgrywają rolę przy wyłanianiu przywódcy przez grupę. Wskaż czynnik, który jest tu nieistotny:
a) dominujący wobec innych sposób bycia
b) łatwość nawiązywania kontaktów
c) wysoka kompetencja w dziedzinach cenionych przez grupę
d) wzorowy konformizm wobec norm i reguł panujących w grupie
e) tendencja do akceptowania przesądów i dyskryminowania mniejszości
(12) Rosnące podobieństwo (zuniformizowanie) stylu życia, wzorów konsumpcyjnych poglądów, urządzeń technicznych w skali całego świata określamy jako:
a) akulturację
b) globalizację
c) etnocentryzm
d) alienację
e) konflikt kulturowy
f) relatywną deprywację
(13) „Dychotomiczny (albo biegunowy) model struktury społecznej" to podział społeczeństwa na:
a) grupy
b) klasy
c) statusy
d) kasty
e) narody
(14) Typ idealny biurokracji opisany przez Webera zawiera wszystkie poniższe cechy z wyjątkiem jednej. Której?
a) specjalizacja zadań i funkcji
b) hierarchia urzędów
c) precyzyjne reguły awansu zawodowego
d) nepotyzm i korupcja
e) pisemne formy podejmowania decyzji
(15) „Wolność, równość, braterstwo!". Te hasła odwołują się do:
a) norm
b) wartości
c) stereotypów
d) etnocentryzmu
e) relatywnej deprywacji
(16) Według E. Durkheima, „fakty społeczne" cechują się następującymi właściwościami prócz jednej. Której?
a) są rozpowszechnione (podzielane) w zbiorowości
b) są przymuszające
c) są zewnętrzne wobec każdej jednostki
d) są obserwowalne zmysłowo
e) należą do kultury
(17) W typologii działań społecznych Webera nie występuje jedna z poniższych kategorii. Która?
a) działanie racjonalne ze względu na środki
b) działanie racjonalne ze względu na wartość
c) działanie logiczne
d) działanie emocjonalne
e) działanie tradycjonalne
(18) Jan zarabia dziesięć razy więcej pieniędzy od Sławka. Nie wiemy, co obaj robią, w jaki sposób zarabiają. Możemy jednak od razu powiedzieć, że jest to przejaw:
a) niesprawiedliwości społecznej
b) wyzysku klasowego
c) sprawiedliwości merytokratycznej
d) zróżnicowania zarobkowego
e) nierówności społecznej
(19) Uporządkuj nazwiska głośnych socjologów od najdawniejszych do najnowszych:
a) Cooley
b) Parsons
c) Comte
d) Weber
e) Znaniecki
(20) Bandyta, który grozi rewolwerem stosuje:
a) przemoc
b) perswazję
c) przymus
d) autorytet
e) wpływ charyzmatyczny
(21) Wielość przynależności grupowych każdej jednostki znajduje wyraz także w:
a) pluralizmie kulturowym
b) konflikcie w roli
c) konflikcie ról
d) walce klas
e) relatywizmie kulturowym
(22) Twórcą ewolucjonizmu i organicyzmu w socjologii był:
a) Marks
b) Durkheim
c) Spencer
d) Darwin
e) Toennies
(23) Podstawowa cecha interakcji społecznej to:
a) wzajemność
b) powtarzalność
c) regulacja normatywna
d) długotrwałość
(24) Uścisk dłoni jako forma przywitania to przykład wszystkich poniższych kategorii z wyjątkiem jednej. Której?
a) konwencja kulturowa
b) zwyczaj społeczny
c) reguła moralna
d) norma etykiety towarzyskiej
e) gest symboliczny
(25) Uścisk dłoni jako forma przywitania to:
a) kompleks kulturowy
b) konfiguracja kulturowa
c) wartość kulturowa
d) element kulturowy
e) mit kulturowy
(26) Przechodzenie z jednej warstwy społecznej do drugiej to:
a) ruchliwość zawodowa
b) ruchliwość pionowa
c) ruchliwość pozioma
d) migracja
e) urbanizacja
(27) „Nierówność społeczna jest nieunikniona, konieczna, wieczna i pożyteczna", to teza:
a) teorii konfliktu społecznego
b) marksistowskiej teorii klas
c) funkcjonalnej teorii stratyfikacji
d) ideologii rewolucyjnej
e) Włodzimierza Lenina
(28) „Margines społecznej tolerancji" to to samo co:
a) permisywizm
b) zespół okoliczności wyłączających zastosowanie sankcji
c) tolerancja wobec ludzi marginesu
d) niewykrywalność przestępstw (tzw. czarna liczba)

(29) Czym nie jest rodzina:
a) grupą społeczną
b) instytucją
c) stowarzyszeniem
d) swoistą formą organizacji
e) grupą pierwotną
(30) Przeciwieństwem stereotypu jest:
a) dogmat religijny
b) ideologia
c) statystyczne rozkłady cech zbiorowości
d) typ idealny

(31) Przeciwieństwem etnocentryzmu jest:
a) nacjonalizm
b) patriotyzm
c) relatywizm kulturowy
d) empiryzm
e) szowinizm
(32) W ujęciu Karola Marksa władza (panowanie) to stosunek między:
a) rolami społecznymi
b) klasami społecznymi
c) proletariuszami
d) kapitalistami
e) rewolucjonistami i rządem
(33) Nagrody i kary to dwie odmiany:
a) sankcji społecznych
b) bodźców
c) norm
d) znaczeń działań ludzkich
e) interakcji
(34) Dwie podstawowe klasy w modelu biegunowym to kapitalizm:
a) rządzący i rządzeni
b) kapitaliści i proletariusze
c) menedżerowie i akcjonariusze

(35) Dyskryminacja etniczna i rasowa prowadzi zawsze do:
a) przyjaźni
b) integracji społecznej

(36) Twórcą koncepcji ewolucji społecznej był:
a) Darwin
b) Marks
c) Parsons

/* ============================================================
   PARSOWANIE
   ============================================================ */
function parseAll(){
  const key={};
  answersText.replace(/\((\d+)\)\s*-\s*([a-e](?:,[a-e])*)/gi,(m,id,ans)=>{ key[id]=ans.toLowerCase(); return m; });
  const lines = questionsText.split('\n');
  const out=[]; let cur=null;
  for(const raw of lines){
    const line=raw.trim();
    if(!line) continue;
    const qm=line.match(/^\((\d+)\)\s*(.*)$/);
    const om=line.match(/^([a-f])\)\s*(.*)$/);
    if(qm){
      if(cur && key[cur.id] && cur.options.length) out.push(cur);
      cur={ id:qm[1], text:qm[2], options:[], correct:key[qm[1]]||null };
    } else if(om && cur){
      cur.options.push({ letter:om[1], text:om[2] });
    } else if(cur){
      // kontynuacja długiej treści pytania
      if(cur.options.length===0) cur.text += ' '+line;
    }
  }
  if(cur && key[cur.id] && cur.options.length) out.push(cur);
  return out;
}
const BANK = parseAll();

/* ============================================================
   STAN
   ============================================================ */
const SAVE_KEY='socjoQuiz_v2';
let queue=[];          // aktywna kolejka pytań (z powtórkami)
let idx=0;
let score=0, streak=0;
let answered=0;        // ile UNIKALNYCH pytań zaliczono (do paska postępu)
let wrongMap={};       // id -> pytanie (do podsumowania)
let shuffleOn=true;
let curSeq=[];         // dla pytań sekwencyjnych
let isAnswered=false;
// system nagrody:
let bloom=0, peak=0;

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildQueue(){
  let base = shuffleOn ? shuffle(BANK) : [...BANK];
  // klon pytań + ewentualne tasowanie opcji
  queue = base.map(q=>{
    const clone={...q, isRetry:false, options:[...q.options]};
    if(shuffleOn && !q.correct.includes(',')) clone.options = shuffle(clone.options);
    return clone;
  });
}

/* ============================================================
   SYSTEM NAGRODY — płynna zmiana kolorystyki
   ============================================================ */
const BLOOM_TARGET = 11; // pełny rozkwit po ~11 trafieniach
function applyBloom(){
  const t = Math.max(0, Math.min(1, bloom / BLOOM_TARGET));
  // ease-out: nagroda widoczna już po 1. poprawnej odpowiedzi, mocno z przodu krzywej
  const e = bloom <= 0 ? 0 : 1 - Math.pow(1 - t, 1.8);
  // wędrówka barwy akcentu: stalowy błękit -> turkus -> fiolet -> róż
  const accentH = 205 + e*115;          // 205 -> 320
  const accent2H = 250 + e*70;          // 250 -> 320
  const accentS = 22 + e*52;            // 22% -> 74%
  const accentL = 52 + e*6;
  const bgL = 7 + e*1.5;
  const surfL = 11 + e*2.5;
  const r = document.documentElement.style;
  r.setProperty('--bloom', t.toFixed(3));
  r.setProperty('--accent-h', accentH.toFixed(1));
  r.setProperty('--accent2-h', accent2H.toFixed(1));
  r.setProperty('--accent-s', accentS.toFixed(1)+'%');
  r.setProperty('--accent-l', accentL.toFixed(1)+'%');
  r.setProperty('--bg-l', bgL.toFixed(1)+'%');
  r.setProperty('--surface-l', surfL.toFixed(1)+'%');
  r.setProperty('--aurora', (e*0.6).toFixed(3));
  r.setProperty('--glow', (e*70).toFixed(1)+'px');
}
function bloomCorrect(){
  bloom += 1;
  peak = Math.max(peak, bloom);
  applyBloom();
}
function bloomWrong(){
  const floor = peak * 0.35;          // nie resetuje się całkowicie
  bloom = Math.max(floor, bloom - 1.6); // cofa się o nieco więcej niż jeden krok
  applyBloom();
}

function save(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      queue, idx, score, streak, answered, wrongMap, shuffleOn, bloom, peak
    }));
  }catch(e){}
}
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(!s||!s.queue||!s.queue.length) return false;
    ({queue,idx,score,streak,answered,wrongMap,shuffleOn,bloom,peak}=s);
    return true;
  }catch(e){ return false; }
}
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

/* ============================================================
   RENDER
   ============================================================ */
const $=id=>document.getElementById(id);

function updateStats(){
  $('cur').textContent = Math.min(answered+1, BANK.length);
  $('tot').textContent = BANK.length;
  $('score').textContent = score;
  $('streak').textContent = streak;
  $('progress').firstElementChild.style.width = (answered/BANK.length*100)+'%';
}

function showQuestion(){
  isAnswered=false;
  // pomijamy puste/zakończone
  if(idx>=queue.length){ return finish(); }
  const q=queue[idx];
  $('retry-badge').classList.toggle('hidden', !q.isRetry);
  $('qnum').textContent='Pytanie '+q.id;
  $('question').textContent=q.text;
  $('next').classList.add('hidden');
  const box=$('options'); box.innerHTML='';

  if(q.correct.includes(',')){ renderSeq(q,box); return; }

  q.options.forEach(opt=>{
    const div=document.createElement('div');
    div.className='option'; div.dataset.letter=opt.letter;
    div.innerHTML='<span class="key">'+opt.letter.toUpperCase()+'</span><span>'+opt.text+'</span>';
    div.onclick=()=>{ if(!isAnswered) selectOption(div, opt.letter, q); };
    box.appendChild(div);
  });
  updateStats();
}

function selectOption(el, letter, q){
  isAnswered=true;
  document.querySelectorAll('.option').forEach(o=>{
    o.classList.add('disabled');
    if(o.dataset.letter===q.correct) o.classList.add('correct');
    if(o===el && letter!==q.correct) o.classList.add('wrong');
  });
  if(letter===q.correct){ correct(q); } else { mistake(q); }
  $('next').classList.remove('hidden');
  updateStats(); save();
}

/* --- pytania sekwencyjne --- */
function renderSeq(q,box){
  if(!curSeq.length || curSeq._for!==q.id){
    curSeq = shuffleOn ? shuffle(q.options) : [...q.options];
    curSeq._for=q.id;
  }
  drawSeq(q,box);
  const btn=document.createElement('button');
  btn.className='primary'; btn.id='checkseq'; btn.textContent='Sprawdź kolejność';
  btn.onclick=()=>checkSeq(q,box,btn);
  box.appendChild(btn);
  updateStats();
}
function drawSeq(q,box){
  box.querySelectorAll('.seq').forEach(n=>n.remove());
  const frag=document.createDocumentFragment();
  curSeq.forEach((opt,i)=>{
    const row=document.createElement('div'); row.className='seq';
    row.innerHTML='<div class="ctrl"><button '+(i===0?'disabled':'')+'>↑</button>'+
                  '<button '+(i===curSeq.length-1?'disabled':'')+'>↓</button></div>'+
                  '<div class="txt">'+opt.text+'</div>';
    const [up,down]=row.querySelectorAll('button');
    up.onclick=()=>{ if(i>0&&!isAnswered){[curSeq[i],curSeq[i-1]]=[curSeq[i-1],curSeq[i]];drawSeq(q,box);} };
    down.onclick=()=>{ if(i<curSeq.length-1&&!isAnswered){[curSeq[i],curSeq[i+1]]=[curSeq[i+1],curSeq[i]];drawSeq(q,box);} };
    frag.appendChild(row);
  });
  const btn=box.querySelector('#checkseq');
  box.insertBefore(frag, btn||null);
}
function checkSeq(q,box,btn){
  if(isAnswered) return; isAnswered=true; btn.remove();
  const userOrder=curSeq.map(o=>o.letter).join(',');
  const ok=userOrder===q.correct;
  box.querySelectorAll('.seq .ctrl button').forEach(b=>b.disabled=true);
  box.querySelectorAll('.seq').forEach(s=>s.classList.add(ok?'ok-seq':'no-seq'));
  const fb=document.createElement('div'); fb.className='feedback '+(ok?'ok':'no');
  if(ok){ correct(q); fb.textContent='Świetnie — prawidłowa kolejność.'; }
  else{ mistake(q); fb.innerHTML='Niepoprawnie. Twoja kolejność: <b>'+userOrder+'</b><br>Poprawna: <b>'+q.correct+'</b>'; }
  box.appendChild(fb);
  curSeq=[];
  $('next').classList.remove('hidden');
  updateStats(); save();
}

/* --- wynik odpowiedzi --- */
function correct(q){
  score++; streak++;
  if(!q.isRetry){ answered++; }
  delete wrongMap[q.id];
  bloomCorrect();
}
function mistake(q){
  streak=0;
  if(!q.isRetry){ answered++; }
  wrongMap[q.id]=BANK.find(b=>b.id===q.id);
  bloomWrong();
  // mechanizm powracających błędów: dodaj powtórkę dalej w kolejce
  const retry={...wrongMap[q.id], isRetry:true, options:[...wrongMap[q.id].options]};
  if(shuffleOn && !retry.correct.includes(',')) retry.options=shuffle(retry.options);
  const pos=Math.min(queue.length, idx + 4 + Math.floor(Math.random()*4));
  queue.splice(pos,0,retry);
}

$('next').onclick=()=>{ idx++; if(idx>=queue.length) finish(); else showQuestion(); };

function finish(){
  $('quiz').classList.add('hidden');
  const s=$('summary'); s.classList.remove('hidden');
  $('fscore').textContent=score;
  $('ftot').textContent=BANK.length;
  $('fpct').textContent=Math.round(score/BANK.length*100);
  const keys=Object.keys(wrongMap);
  const list=$('errlist'); list.innerHTML='';
  if(keys.length){
    $('errs').classList.remove('hidden');
    keys.sort((a,b)=>a-b).forEach(k=>{
      const q=wrongMap[k]; let ans='';
      if(!q.correct.includes(',')){
        const o=q.options.find(o=>o.letter===q.correct);
        ans=q.correct+') '+(o?o.text:'');
      }else{
        ans=q.correct.split(',').map(l=>{const o=q.options.find(o=>o.letter===l);return o?l+') '+o.text:l;}).join(' → ');
      }
      const d=document.createElement('div'); d.className='err';
      d.innerHTML='<div class="q">('+q.id+') '+q.text+'</div><div class="a">Poprawna: '+ans+'</div>';
      list.appendChild(d);
    });
  } else $('errs').classList.add('hidden');
  clearSave();
}

/* ============================================================
   STEROWANIE
   ============================================================ */
$('shuffle-toggle').addEventListener('change', e=>{
  shuffleOn=e.target.checked;
  $('shuffle-switch').classList.toggle('on', shuffleOn);
  // przebuduj świeżą sesję z nowym ustawieniem
  startFresh(true);
});

function startFresh(keepBloom){
  buildQueue();
  idx=0; score=0; streak=0; answered=0; wrongMap={}; curSeq=[];
  if(!keepBloom){ bloom=0; peak=0; }
  applyBloom();
  $('summary').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  showQuestion(); save();
}

function restart(){ startFresh(false); }
function resetSession(){ clearSave(); shuffleOn=true; $('shuffle-toggle').checked=true; $('shuffle-switch').classList.add('on'); startFresh(false); }

function init(){
  if(load()){
    $('shuffle-toggle').checked=shuffleOn;
    $('shuffle-switch').classList.toggle('on', shuffleOn);
    applyBloom();
    if(idx>=queue.length){ finish(); }
    else { $('summary').classList.add('hidden'); $('quiz').classList.remove('hidden'); showQuestion(); }
  } else {
    $('shuffle-toggle').checked=true;
    $('shuffle-switch').classList.add('on');
    startFresh(false);
  }
}

/* skróty klawiszowe */
document.addEventListener('keydown', e=>{
  if($('quiz').classList.contains('hidden')) return;
  const q=queue[idx]; if(!q) return;
  if(e.key==='Enter'){
    if(!$('next').classList.contains('hidden')) $('next').click();
    else if(q.correct.includes(',') && !isAnswered){ const b=$('checkseq'); if(b) b.click(); }
    return;
  }
  if(!isAnswered && !q.correct.includes(',')){
    const k=e.key.toLowerCase();
    if('abcde'.includes(k)){
      document.querySelectorAll('.option').forEach(o=>{ if(o.dataset.letter===k) o.click(); });
    }
  }
});

init();
</script>
